<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Ferramentas Acadêmicas | Uniara</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --uniara-blue: #008cd2; 
            --uniara-red: #ec1c24;  
            --uniara-dark: #111827;
            --bg: #f9fafb;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: white;
            width: 100%;
            max-width: 550px; /* Aumentado levemente para acomodar as colunas */
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            text-align: center;
            border: 1px solid #f3f4f6;
        }

        .logo-uniara {
            max-width: 170px;
            margin-bottom: 24px;
        }

        h1 { font-size: 24px; font-weight: 700; color: var(--uniara-dark); margin: 0 0 8px 0; letter-spacing: -0.025em; }
        p.subtitle { color: #6b7280; margin: 0 0 32px 0; font-size: 15px; line-height: 1.5; }

        .btn-group { display: grid; gap: 12px; margin-bottom: 35px; }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            gap: 10px;
        }

        .btn-sipe { background-color: var(--uniara-blue); color: white; }
        .btn-sipe:hover { background-color: #007bb0; transform: translateY(-2px); }

        .btn-ppc { background-color: var(--uniara-dark); color: white; }
        .btn-ppc:hover { background-color: #000; transform: translateY(-2px); }

        /* NOVA SEÇÃO DE RECURSOS E SUPORTE */
        .extra-links {
            margin-top: 20px;
            padding-top: 25px;
            border-top: 1px solid #f1f5f9;
            text-align: left;
        }

        .section-title {
            font-size: 11px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 700;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .section-title::before, .section-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #f1f5f9;
        }

        .support-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            position: relative;
        }

        /* Linha divisória vertical */
        .support-grid::after {
            content: "";
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 1px;
            background-color: #f1f5f9;
        }

        .column-title {
            font-size: 11px;
            color: #94a3b8;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 15px;
            display: block;
        }

        .item-link {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #475569;
            font-size: 14px;
            margin-bottom: 12px;
            transition: color 0.2s;
            gap: 10px;
        }

        .item-link:hover {
            color: var(--uniara-blue);
        }

        .item-link i {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .footer {
            margin-top: 40px;
            font-size: 11px;
            color: #94a3b8;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="logo_uniara_oficial.png" alt="Logo Uniara" class="logo-uniara">
        
        <h1>Portal de Ferramentas Acadêmicas</h1>
        <p class="subtitle">Gestão estratégica de ensino e conformidade de projetos pedagógicos Uniara.</p>

        <div class="btn-group">
            <a href="https://sipe.gbxlearningtools.com/" target="_blank" class="btn btn-sipe">
                <i data-lucide="layout-dashboard"></i> Acessar SIPE
            </a>
            <a href="https://gerappc.gbxlearningtools.com/" target="_blank" class="btn btn-ppc">
                <i data-lucide="file-edit"></i> Acessar Gera PPC
            </a>
        </div>

        <div class="extra-links">
            <div class="section-title">Recursos e Suporte Técnico</div>
            
            <div class="support-grid">
                <div class="support-column">
                    <span class="column-title">Documentação</span>
                    <a href="https://drive.google.com/file/d/16qHK7s_25s0eBR11El17By7fMlVzz_ml/view?usp=sharing" target="_blank" class="item-link">
                        <i data-lucide="book-open"></i> Guia de Uso - SIPE
                    </a>
                    <a href="https://drive.google.com/file/d/1zn6H8Yb4Sfu9bNsU7yy9ZHFd3MYfA4UP/view?usp=sharing" target="_blank" class="item-link">
                        <i data-lucide="scroll-text"></i> Guia de Uso - PPC
                    </a>
                </div>

                <div class="support-column" style="padding-left: 15px;">
                    <span class="column-title">Suporte</span>
                    <a href="https://wa.me/5516981492620" target="_blank" class="item-link">
                        <i data-lucide="message-circle" style="color: #25D366;"></i> WhatsApp
                    </a>
                    <a href="mailto:gbraz@uniara.edu.br" class="item-link">
                        <i data-lucide="mail"></i> Enviar E-mail
                    </a>
                </div>
            </div>
        </div>

        <div class="footer">
            © UNIVERSIDADE DE ARARAQUARA
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
